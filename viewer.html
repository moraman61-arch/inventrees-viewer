<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventrees – Visor de Árbol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #111;
      height: 100vh;
      overflow: hidden;
    }

    #pano {
      width: 100%;
      height: 100vh;
    }

    /* ── Etiqueta central ─────────────────────────────────────── */
    #tree-label {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #tree-label .crosshair {
      width: 28px;
      height: 28px;
      position: relative;
    }
    #tree-label .crosshair::before,
    #tree-label .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 220, 0, 0.9);
      border-radius: 2px;
    }
    #tree-label .crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #tree-label .crosshair::after  { width: 100%; height: 2px; top: 50%;  transform: translateY(-50%); }

    #tree-label .badge {
      background: rgba(20, 20, 20, 0.82);
      border: 1px solid rgba(255, 220, 0, 0.7);
      border-radius: 8px;
      padding: 8px 14px;
      color: #fff;
      font-size: 13px;
      line-height: 1.6;
      backdrop-filter: blur(4px);
      text-align: center;
      min-width: 180px;
    }

    #tree-label .badge .tree-id {
      font-size: 16px;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 0.5px;
    }

    #tree-label .badge .tree-meta {
      color: #ccc;
      font-size: 11px;
      margin-top: 3px;
    }

    /* ── Panel de info (esquina inferior-izquierda) ───────────── */
    #info-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(20, 20, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ddd;
      font-size: 12px;
      line-height: 1.8;
      backdrop-filter: blur(4px);
      z-index: 10;
      max-width: 280px;
    }

    #info-panel .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #ffd700;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(255,220,0,0.3);
      padding-bottom: 4px;
    }

    #info-panel table { border-collapse: collapse; width: 100%; }
    #info-panel td { padding: 1px 4px; }
    #info-panel td:first-child { color: #888; white-space: nowrap; padding-right: 10px; }
    #info-panel td:last-child  { color: #fff; word-break: break-all; }

    /* ── Mensaje de error ─────────────────────────────────────── */
    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(180, 0, 0, 0.9);
      color: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      font-size: 15px;
      text-align: center;
      display: none;
      z-index: 20;
    }
  </style>
</head>
<body>

<div id="pano"></div>

<div id="tree-label">
  <div class="crosshair"></div>
  <div class="badge">
    <div class="tree-id" id="lbl-uuid">–</div>
    <div class="tree-meta" id="lbl-meta"></div>
  </div>
</div>

<div id="info-panel">
  <div class="panel-title">🌳 Datos del árbol</div>
  <table id="info-table"></table>
</div>

<div id="error-msg" id="error-msg"></div>

<script>
  // ─── Leer parámetros del URL ────────────────────────────────────────────────
  const params  = new URLSearchParams(window.location.search);

  const lat     = parseFloat(params.get('lat'));
  const lng     = parseFloat(params.get('lng'));
  const heading = parseFloat(params.get('heading') ?? '0');
  const pitch   = parseFloat(params.get('pitch')   ?? '0');
  const panoId  = params.get('pano')  ?? '';
  const uuid    = params.get('uuid')  ?? '–';
  const idArbol = params.get('id')    ?? '';
  const dist    = params.get('dist')  ?? '';
  const date    = params.get('date')  ?? '';

  // ─── Rellenar etiqueta central ─────────────────────────────────────────────
  document.getElementById('lbl-uuid').textContent = idArbol ? `Árbol ${idArbol}` : uuid;
  const metaParts = [];
  if (dist)    metaParts.push(`Dist: ${parseFloat(dist).toFixed(1)} m`);
  if (pitch)   metaParts.push(`Pitch: ${parseFloat(pitch).toFixed(1)}°`);
  document.getElementById('lbl-meta').textContent = metaParts.join('   ');

  // ─── Rellenar panel inferior ───────────────────────────────────────────────
  const rows = [
    ['UUID',   uuid],
    ['ID',     idArbol || '–'],
    ['Lat',    isNaN(lat) ? '–' : lat.toFixed(7)],
    ['Lng',    isNaN(lng) ? '–' : lng.toFixed(7)],
    ['Heading', isNaN(heading) ? '–' : heading.toFixed(1) + '°'],
    ['Pitch',   isNaN(pitch)   ? '–' : pitch.toFixed(1) + '°'],
    ['Dist',    dist  ? parseFloat(dist).toFixed(2) + ' m' : '–'],
    ['Fecha pano', date || '–'],
    ['Pano ID', panoId || '–'],
  ];
  const table = document.getElementById('info-table');
  rows.forEach(([label, value]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${label}</td><td>${value}</td>`;
    table.appendChild(tr);
  });

  // ─── Inicializar Street View ───────────────────────────────────────────────
  window.initViewer = function () {
    const panoDiv = document.getElementById('pano');

    const panoOptions = {
      pov:          { heading, pitch },
      zoom:         1,
      addressControl:       false,
      showRoadLabels:       false,
      fullscreenControl:    false,
      motionTracking:       false,
      motionTrackingControl: false,
      linksControl:         true,
      panControl:           true,
      zoomControl:          true,
    };

    if (panoId) {
      // Cargar directamente por panoId (más preciso)
      panoOptions.pano = panoId;
    } else if (!isNaN(lat) && !isNaN(lng)) {
      // Fallback: por coordenadas
      panoOptions.position = { lat, lng };
    } else {
      showError('Faltan parámetros: se requiere lat/lng o pano ID.');
      return;
    }

    const panorama = new google.maps.StreetViewPanorama(panoDiv, panoOptions);

    // Si el panorama no está disponible en esa ubicación
    panorama.addListener('status_changed', () => {
      if (panorama.getStatus() === google.maps.StreetViewStatus.ZERO_RESULTS) {
        showError('No se encontró panorama de Street View en esta ubicación.');
      }
    });
  };

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('tree-label').style.display = 'none';
    document.getElementById('info-panel').style.display = 'none';
  }
</script>

<!--
  IMPORTANTE – API Key:
  Reemplaza YOUR_MAPS_API_KEY con tu clave de Google Maps JavaScript API.

  Restricción de dominio recomendada (Google Cloud Console):
  1. Ir a APIs & Services → Credentials → seleccionar tu clave
  2. En "Application restrictions" → HTTP referrers
  3. Agregar: moraman61-arch.github.io/*
  4. En "API restrictions" → Restrict key → Maps JavaScript API
-->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCJaps2tJzAMFt4TdVkIEadc3xh1s9Tx_o&callback=initViewer"
  async defer>
</script>

</body>
</html>
